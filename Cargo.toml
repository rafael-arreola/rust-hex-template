[workspace]
resolver = "3"
members = [
    "core/domain",
    "core/usecases",
    "infra/mongo",
    "infra/redis",
    "infra/http-axum",
]

[workspace.dependencies]
# Web Framework (REST)
axum = "0.8"
tower = { version = "0.5", features = ["util", "make"] }
tower-http = { version = "0.6", features = [
    "cors",
    "trace",
    "timeout",
    "compression-gzip",
    "decompression-gzip",
] }

# Async Runtime
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# Serialization / Validation
serde = { version = "1", features = ["derive"] }
serde_with = "3"
serde_json = "1"
validator = { version = "0.20", features = ["derive"] }

# Database (Drivers)
mongodb = { version = "3", features = [
    "bson-3",
    "rustls-tls",
    "dns-resolver",
    "sync",
] }
bson = { version = "3", features = ["chrono-0_4", "serde"] }
redis = { version = "1", features = ["aio", "tokio-comp"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
    "json",
    "fmt",
    "env-filter",
] }
tracing-stackdriver = { version = "0.10", features = ["opentelemetry"] }
tracing-opentelemetry = "0.33"

# OpenTelemetry
opentelemetry = "0.32"
opentelemetry_sdk = "0.32"
opentelemetry-gcloud-trace = "0.24"
opentelemetry-semantic-conventions = "0.32"

# Utils / Types
rustls = "0.23"
chrono = { version = "0.4", default-features = false, features = [
    "serde",
    "clock",
] }
chrono-tz = "0.10"
uuid = { version = "1", features = ["v4", "serde"] }
dotenvy = "0.15"
async-trait = "0.1"

# Error Handling
thiserror = "2"
anyhow = "1"

# Workspace Members
domain = { path = "core/domain" }
usecases = { path = "core/usecases" }
infra-mongo = { path = "infra/mongo" }
infra-redis = { path = "infra/redis" }

[profile.release]
lto = true
opt-level = 3
strip = true

[profile.dev]
opt-level = 0
debug = true
incremental = true

[profile.dev.package."*"]
opt-level = 3
